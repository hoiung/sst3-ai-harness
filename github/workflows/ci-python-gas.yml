name: CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Install dependencies
      run: |
        uv venv
        uv pip install ruff black pytest
        if [ -f requirements.txt ]; then uv pip install -r requirements.txt; fi
        if [ -f pyproject.toml ]; then uv pip install -e .; fi

    - name: Lint with Ruff
      run: |
        uv run ruff check . || true

    - name: Check formatting with Ruff
      run: |
        uv run ruff format --check . || true

    - name: Lint with Black (backup)
      run: |
        uv run black --check . || true

    - name: Run tests
      run: |
        if [ -d tests ]; then
          uv run pytest tests/ -v || echo "No tests found or tests failed"
        else
          echo "No tests directory found"
        fi
