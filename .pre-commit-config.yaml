# Pre-commit hooks for dotfiles repository
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  # SST3 Self-Optimizing hooks (Phase 5)
  - repo: local
    hooks:
      - id: sst3-pre-commit-checks
        name: SST3 Pre-Commit Validation
        entry: python
        args: [SST3/scripts/pre-commit-checks.py]
        language: system
        pass_filenames: false
        stages: [pre-commit]
        verbose: true

      - id: check-claude-template-propagation
        name: Check CLAUDE Template Propagation
        entry: python
        args: [SST3/scripts/check-propagation.py]
        language: system
        files: ^(SST3/templates/CLAUDE_TEMPLATE\.md|CLAUDE\.md)$
        pass_filenames: false
        stages: [pre-commit]
        verbose: true

      - id: auto-stage-tracked-folders
        name: Auto-stage SST3-metrics, archive, and docs
        entry: python
        args: [SST3/scripts/auto-stage-tracked-folders.py]
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true

      - id: check-devprojects-clean
        name: Validate DevProjects/ cleanliness
        entry: python SST3/scripts/check-devprojects-clean.py
        language: system
        pass_filenames: false
        always_run: true

      - id: no-temp-folder
        name: Prevent temp/ and tmp/ folder commits
        entry: bash -c 'TEMP_FILES=$(git diff --cached --name-only | grep -E "^temp/|/temp/|^tmp/|/tmp/"); if [ -n "$TEMP_FILES" ]; then echo "ERROR - temp/tmp folders not allowed in repos."; echo "Use C:/temp/ instead and delete the folder."; echo ""; echo "Blocked files -"; echo "$TEMP_FILES"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

      - id: check-crossrepo-paths
        name: Check SST3 cross-repo path format
        entry: python SST3/scripts/check-crossrepo-paths.py
        language: python
        files: ^SST3/.*\.md$
        pass_filenames: false

      - id: check-issue-assignment-change
        name: Check Issue Assignment changes
        entry: python
        args: [SST3/scripts/check-issue-assignment-change.py]
        language: system
        files: ^SST3/templates/issue-template\.md$
        pass_filenames: false
        stages: [pre-commit]
        verbose: true

      - id: check-hardcoded-params
        name: Check for hardcoded parameters
        entry: python SST3/scripts/check-hardcoded-params.py .
        language: system
        pass_filenames: false
        always_run: true

      - id: check-ai-writing-tells
        name: Check public content for AI writing tells
        entry: python SST3/scripts/check-ai-writing-tells.py
        language: system
        files: ^cv-linkedin/.*\.md$
        pass_filenames: true

      - id: check-public-repo-secrets
        name: Check for secrets in public repo
        entry: python scripts/check-public-repo-secrets.py . --staged-only
        language: system
        pass_filenames: false
        always_run: true

      - id: secret-rules-drift
        name: Secret detection script drift check
        entry: bash
        args:
          - -c
          - |
            CANONICAL=../dotfiles/SST3/scripts/check-public-repo-secrets.py
            LOCAL=scripts/check-public-repo-secrets.py
            [ -f "$CANONICAL" ] || { echo "SKIP: dotfiles not found — drift check skipped" >&2; exit 0; }
            cmp -s "$LOCAL" "$CANONICAL" || { echo "ERROR: $LOCAL has drifted. Run: cp $CANONICAL $LOCAL" >&2; exit 1; }
        language: system
        pass_filenames: false
        always_run: true

  # Standard file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

# Configuration
default_language_version:
  python: python3

# Exclude patterns
exclude: |
  (?x)^(
    \.git/|
    \.venv/|
    __pycache__/|
    \.pytest_cache/|
    .*\.pyc|
    .*\.egg-info/|
    dist/|
    build/
  )

# Set default stages
default_stages: [pre-commit, pre-push]

# Allow running even when there are unstaged changes
fail_fast: false
