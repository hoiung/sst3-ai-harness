name: Validate Config Files

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Validate JSON files
      run: |
        echo "Validating JSON files..."
        find . -name "*.json" -print0 | while IFS= read -r -d '' file; do
          echo "Checking $file"
          node -e "JSON.parse(require('fs').readFileSync('$file', 'utf8'))" && echo "  ✓ Valid" || exit 1
        done

    - name: Validate YAML files
      run: |
        echo "Validating YAML files..."
        python3 -c "import sys, yaml; [yaml.safe_load(open(f)) for f in sys.argv[1:]]" $(find . -name "*.yml" -o -name "*.yaml") && echo "✓ All YAML files are valid" || exit 1

    - name: Check JavaScript syntax
      run: |
        echo "Checking JavaScript files..."
        find . -name "*.js" -print0 | while IFS= read -r -d '' file; do
          echo "Checking $file"
          node --check "$file" && echo "  ✓ Valid syntax" || exit 1
        done

    - name: Validate Markdown files
      run: |
        echo "Checking Markdown files..."
        npm install -g markdownlint-cli
        markdownlint '**/*.md' --disable MD013 MD041 || echo "✓ Markdown files checked (warnings ignored)"
      continue-on-error: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Verify mirror drift manifest (hoiung/dotfiles#418)
      run: python3 scripts/check-mirror-drift.py

    - name: Secret detection (blocking)
      run: python3 scripts/check-public-repo-secrets.py .

    - name: Commit-message secret scan — push events (blocking)
      if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python3 scripts/check-public-repo-secrets.py \
          --scan-commit-messages \
          --since ${{ github.event.before }}

    - name: Commit-message secret scan — PR events (blocking)
      if: github.event_name == 'pull_request'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python3 scripts/check-public-repo-secrets.py \
          --scan-commit-messages \
          --since ${{ github.event.pull_request.base.sha }}
