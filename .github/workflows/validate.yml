name: Validate Config Files

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Validate JSON files
      run: |
        echo "Validating JSON files..."
        find . -name "*.json" -print0 | while IFS= read -r -d '' file; do
          echo "Checking $file"
          node -e "JSON.parse(require('fs').readFileSync('$file', 'utf8'))" && echo "  ✓ Valid" || exit 1
        done

    - name: Validate YAML files
      run: |
        echo "Validating YAML files..."
        python3 -c "import sys, yaml; [yaml.safe_load(open(f)) for f in sys.argv[1:]]" $(find . -name "*.yml" -o -name "*.yaml") && echo "✓ All YAML files are valid" || exit 1

    - name: Check JavaScript syntax
      run: |
        echo "Checking JavaScript files..."
        find . -name "*.js" -print0 | while IFS= read -r -d '' file; do
          echo "Checking $file"
          node --check "$file" && echo "  ✓ Valid syntax" || exit 1
        done

    - name: Validate Markdown files
      run: |
        echo "Checking Markdown files..."
        npm install -g markdownlint-cli
        markdownlint '**/*.md' --disable MD013 MD041 || echo "✓ Markdown files checked (warnings ignored)"
      continue-on-error: true

    - name: Check for sensitive data
      run: |
        echo "Checking for potential secrets..."
        if grep -r -E "(password|secret|apiKey|api_key)\s*=\s*['\"][^'\"]+['\"]" . --include="*.json" --include="*.js" --exclude-dir=".git" | grep -v -E "(tokenColor|tokenInfo|tokenMatch|TOKEN_LIMIT)"; then
          echo "⚠️  WARNING: Found potential sensitive data"
          exit 1
        else
          echo "✓ No obvious secrets found"
        fi
      continue-on-error: true
